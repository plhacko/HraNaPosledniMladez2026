<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A1A2E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mládež 2026">
  <link rel="manifest" href="manifest.json">
  <title>Mládež 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════════════════════════════════════════════
       SCREEN: Úvod
  ══════════════════════════════════════════════════ -->
  <div id="screen-splash" class="screen">
    <div class="splash-hero">
      <div class="uno-card splash-card color-red">
        <span class="corner tl">★</span>
        <div class="card-oval splash-oval">
          <div class="card-oval-inner">
            <h1 class="splash-title">Mládež<br>2026</h1>
          </div>
        </div>
        <span class="corner br">★</span>
      </div>
    </div>
    <p class="splash-subtitle">Najdi všechna stanoviště</p>
    <div class="splash-buttons">
      <button id="btn-start" class="btn btn-red">Spustit hru</button>
      <button id="btn-continue" class="btn btn-blue hidden">Pokračovat</button>
      <button id="btn-new-game" class="btn btn-outline hidden">Nová hra</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════
       SCREEN: Přehled stanovišť
  ══════════════════════════════════════════════════ -->
  <div id="screen-overview" class="screen hidden">
    <header class="app-header">
      <span class="app-title">Mládež 2026</span>
      <span id="progress-chip" class="progress-chip">0 / 12</span>
    </header>
    <div id="cards-grid" class="cards-grid"></div>
    <div class="sticky-bar">
      <button id="btn-check-location" class="btn btn-red full-width">
        📍 Zkontrolovat moji polohu
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════
       SCREEN: Detail stanoviště
  ══════════════════════════════════════════════════ -->
  <div id="screen-detail" class="screen hidden">
    <div class="detail-wrapper">
      <button id="btn-back" class="btn-back">← Zpět</button>
      <div id="detail-card" class="uno-card detail-card color-red">
        <span id="detail-corner-tl" class="corner tl">1</span>
        <div class="card-oval detail-oval">
          <div class="card-oval-inner">

            <div id="state-checking" class="detail-state">
              <span class="state-icon">⏳</span>
              <p class="state-text">Zjišťuji polohu…</p>
            </div>

            <div id="state-far" class="detail-state hidden">
              <span class="state-icon">📍</span>
              <p id="detail-distance-text" class="state-text">Nejsi na místě</p>
              <button id="btn-retry" class="btn btn-dark">Zkusit znovu</button>
            </div>

            <div id="state-near" class="detail-state hidden">
              <p id="detail-task-text" class="task-text"></p>
              <button id="btn-complete" class="btn btn-green-solid">Označit jako splněné ✓</button>
            </div>

            <div id="state-done" class="detail-state hidden">
              <span class="state-icon">✅</span>
              <p class="state-text">Úkol splněn!</p>
            </div>

          </div>
        </div>
        <span id="detail-corner-br" class="corner br">1</span>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════
       SCREEN: Všechna stanoviště splněna
  ══════════════════════════════════════════════════ -->
  <div id="screen-done" class="screen hidden">
    <div id="confetti-container" class="confetti-container"></div>
    <div class="done-content">
      <div class="wild-card">
        <div class="wild-q red"></div>
        <div class="wild-q blue"></div>
        <div class="wild-q green"></div>
        <div class="wild-q yellow"></div>
        <div class="wild-oval">
          <div class="wild-oval-inner">🎉</div>
        </div>
      </div>
      <h2 class="done-title">Všechna stanoviště splněna!</h2>
      <p class="done-subtitle">Gratulujeme, Mládeži 2026!</p>
      <button id="btn-reset" class="btn btn-red">Hrát znovu</button>
    </div>
  </div>

  <script src="locations.js"></script>
  <script src="app.js"></script>
</body>
</html>
